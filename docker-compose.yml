services:
  db:
    image: postgres:16
    container_name: payroll-attendance-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: payroll
      POSTGRES_PASSWORD: payroll123
      POSTGRES_DB: payroll_attendance_development
    ports:
      - "5432:5432"
    volumes:
      - payroll_attendance_pg_data:/var/lib/postgresql/data

volumes:
  payroll_attendance_pg_data:
